<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next PS — Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --gold: #f0c040;
            --text: #f0e8d8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            height: 100vh;
            background: transparent; /* Menghapus background hitam */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        .login-container {
            width: 90%;
            max-width: 340px;
            background: rgba(18, 12, 31, 0.9); /* Transparansi sedikit agar teks tetap terbaca */
            border: 1px solid rgba(240, 192, 64, 0.3);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 2px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid rgba(240, 192, 64, 0.2);
            background: rgba(0, 0, 0, 0.4); /* Input transparan gelap */
            color: #fff;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: var(--gold);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            border: none;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-login:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-register {
            background: none;
            border: none;
            color: var(--gold);
            font-weight: 700;
            font-size: 12px;
            margin-top: 15px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>NEXT PS</h2>

    <form method="POST" action="/player/growid/login/validate">
        <input type="text" name="growId" class="form-control" placeholder="GrowID" required spellcheck="false" />
        <input type="password" name="password" class="form-control" placeholder="Password" required />
        <button type="submit" class="btn-login">LOGIN</button>
    </form>

    <form method="POST" action="/player/growid/login/validate">
        <input type="hidden" name="growId" value="" />
        <input type="hidden" name="password" value="" />
        <button type="submit" class="btn-register">CREATE NEW ACCOUNT</button>
    </form>
</div>

</body>
</html>
